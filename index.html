<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안산시 생생 맛집 지도</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Google Fonts (Inter & Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- PapaParse (CSV Parsing) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
        /* Custom scrollbar for beautiful dashboard lists */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Leaflet custom overrides */
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            padding: 4px;
        }
        .leaflet-popup-tip {
            background: white;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col overflow-hidden">

    <header class="bg-gradient-to-r from-emerald-600 to-teal-700 text-white shadow-md px-6 py-4 flex flex-wrap justify-between items-center z-10">
        <div class="flex items-center space-x-3">
            <div class="bg-white/20 p-2 rounded-xl backdrop-blur-md">
                <i data-lucide="map" class="w-6 h-6 text-yellow-300"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight flex items-center gap-2">
                    안산시 생생 맛집 지도 <span class="bg-yellow-400 text-slate-900 text-xs font-bold px-2 py-0.5 rounded-full">Vibrant Gourmet</span>
                </h1>
                <p class="text-xs text-emerald-100 mt-0.5">업로드 파일의 모든 데이터 연계 실시간 맛집 지도</p>
            </div>
        </div>
        <div class="flex items-center space-x-4 mt-2 sm:mt-0">
            <!-- File Upload Zone -->
            <label class="relative flex items-center space-x-2 bg-white/10 hover:bg-white/20 border border-white/20 px-4 py-2 rounded-xl cursor-pointer text-xs font-medium transition duration-200">
                <i data-lucide="upload-cloud" class="w-4 h-4 text-emerald-200"></i>
                <span id="fileNameLabel">새 CSV 파일로 업데이트</span>
                <input type="file" id="csvFileInput" accept=".csv" class="hidden" />
            </label>
        </div>
    </header>

    <!-- Main Workspace Container -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
        
        <section class="w-full lg:w-96 bg-white border-r border-slate-200 flex flex-col z-10 shadow-lg lg:shadow-none h-2/5 lg:h-full">
            
            <!-- Filter & Search Controls Section -->
            <div class="p-4 border-b border-slate-100 space-y-4 bg-slate-50/50">
                <!-- Dropzone Notification Info -->
                <div id="uploadAlert" class="bg-emerald-50 border border-emerald-200 text-emerald-800 p-3 rounded-xl flex items-start space-x-2.5 text-xs">
                    <i data-lucide="info" class="w-4 h-4 text-emerald-600 mt-0.5 flex-shrink-0"></i>
                    <div>
                        <span class="font-bold">업로드 파일 연동 완료!</span><br>
                        안산시 생생맛집 CSV 파일 내의 <span class="font-bold text-emerald-700">전체 데이터(총 49개 소)</span>를 완벽하게 불러와 지도에 연동시켰습니다.
                    </div>
                </div>

                <!-- Live Search input -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </span>
                    <input type="text" id="searchInput" placeholder="상호명, 설명, 주소 검색..." class="w-full pl-9 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition shadow-inner">
                </div>

                <!-- Region and Category Selector -->
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-500 mb-1">1. 지역 선택 (구)</label>
                        <select id="regionFilter" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition cursor-pointer">
                            <option value="ALL">전체 안산시</option>
                            <option value="단원구">단원구</option>
                            <option value="상록구">상록구</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-500 mb-1">2. 식당 분류</label>
                        <select id="categoryFilter" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition cursor-pointer">
                            <option value="ALL">전체 분류</option>
                            <option value="한식">한식</option>
                            <option value="중식">중식</option>
                            <option value="일식">일식</option>
                            <option value="양식">양식</option>
                            <option value="카페">카페/디저트</option>
                            <option value="기타">기타/복합</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Stats Bar -->
            <div class="bg-slate-100/60 px-4 py-2 border-b border-slate-200 flex justify-between items-center text-xs font-semibold text-slate-600">
                <span class="flex items-center gap-1">
                    <i data-lucide="filter" class="w-3.5 h-3.5 text-slate-500"></i> 필터결과: <span id="countSpan" class="text-emerald-600 font-bold">0</span>건
                </span>
                <span id="activeFiltersLabel" class="text-[10px] text-slate-400 font-normal">안산시 전역</span>
            </div>

            <!-- Scrollable List of Restaurants -->
            <div class="flex-1 overflow-y-auto p-3 space-y-2 bg-slate-50/30" id="restaurantList">
                <!-- Card Elements will be dynamically generated here -->
            </div>
        </section>

        <section class="flex-1 h-3/5 lg:h-full relative flex flex-col">
            <!-- Floating Quick Stats Widget -->
            <div class="absolute top-4 left-4 z-[500] hidden md:flex items-center space-x-3 bg-white/95 backdrop-blur-md p-3.5 rounded-2xl shadow-xl border border-slate-200/80">
                <div class="text-center px-2">
                    <p class="text-[10px] text-slate-400 font-medium">실제 맛집 총계</p>
                    <p id="totalStat" class="text-lg font-extrabold text-slate-800">49</p>
                </div>
                <div class="w-px h-8 bg-slate-200"></div>
                <div class="text-center px-2">
                    <p class="text-[10px] text-teal-600 font-medium">단원구</p>
                    <p id="danwonStat" class="text-lg font-extrabold text-teal-600">0</p>
                </div>
                <div class="w-px h-8 bg-slate-200"></div>
                <div class="text-center px-2">
                    <p class="text-[10px] text-sky-600 font-medium">상록구</p>
                    <p id="sangrokStat" class="text-lg font-extrabold text-sky-600">0</p>
                </div>
            </div>

            <!-- Leaflet Map Instance -->
            <div id="map" class="w-full h-full"></div>

            <div id="detailPanel" class="absolute bottom-4 right-4 left-4 md:left-auto md:w-96 z-[500] bg-white rounded-2xl shadow-2xl border border-slate-200/90 transform translate-y-full opacity-0 pointer-events-none transition-all duration-300 ease-out flex flex-col">
                <div class="p-4 border-b border-slate-100 flex justify-between items-start">
                    <div>
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <span id="detailCategory" class="px-2 py-0.5 rounded text-[10px] font-bold text-slate-100 bg-emerald-600">한식</span>
                            <span id="detailRegion" class="px-2 py-0.5 rounded text-[10px] font-bold text-slate-700 bg-slate-100">단원구</span>
                        </div>
                        <h3 id="detailName" class="text-lg font-extrabold text-slate-900 mt-1.5">식당명</h3>
                    </div>
                    <button onclick="closeDetailPanel()" class="text-slate-400 hover:text-slate-600 p-1 hover:bg-slate-100 rounded-lg transition">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="p-4 space-y-3.5 max-h-72 overflow-y-auto text-sm">
                    <!-- description -->
                    <div class="bg-emerald-50/50 p-3 rounded-xl border border-emerald-100/50">
                        <p class="text-xs text-slate-500 font-semibold flex items-center gap-1 mb-1">
                            <i data-lucide="sparkles" class="w-3.5 h-3.5 text-emerald-600"></i> 식당 스토리 및 특징
                        </p>
                        <p id="detailDescription" class="text-slate-700 leading-relaxed text-xs">상세 설명이 이곳에 들어갑니다.</p>
                    </div>

                    <!-- Details Grid -->
                    <div class="grid grid-cols-1 gap-2.5">
                        <div class="flex items-start space-x-2.5">
                            <div class="p-1.5 bg-slate-100 rounded-lg text-slate-500 mt-0.5">
                                <i data-lucide="map-pin" class="w-3.5 h-3.5"></i>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-400 font-bold">주소지</p>
                                <p id="detailAddress" class="text-xs text-slate-700 font-medium">주소 정보</p>
                            </div>
                        </div>

                        <div class="flex items-start space-x-2.5">
                            <div class="p-1.5 bg-slate-100 rounded-lg text-slate-500 mt-0.5">
                                <i data-lucide="phone" class="w-3.5 h-3.5"></i>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-400 font-bold">전화번호</p>
                                <a id="detailPhoneLink" href="#" class="text-xs text-emerald-600 hover:underline font-semibold">전화번호 정보</a>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-2">
                            <div class="bg-slate-50 p-2 rounded-xl text-center">
                                <i data-lucide="armchair" class="w-4 h-4 mx-auto text-slate-500 mb-1"></i>
                                <p class="text-[9px] text-slate-400">좌석</p>
                                <p id="detailSeats" class="text-xs font-semibold text-slate-700 mt-0.5">정보 없음</p>
                            </div>
                            <div class="bg-slate-50 p-2 rounded-xl text-center">
                                <i data-lucide="car" class="w-4 h-4 mx-auto text-slate-500 mb-1"></i>
                                <p class="text-[9px] text-slate-400">주차</p>
                                <p id="detailParking" class="text-xs font-semibold text-slate-700 mt-0.5">정보 없음</p>
                            </div>
                            <div class="bg-slate-50 p-2 rounded-xl text-center">
                                <i data-lucide="calendar-off" class="w-4 h-4 mx-auto text-slate-500 mb-1"></i>
                                <p class="text-[9px] text-slate-400">휴무일</p>
                                <p id="detailHoliday" class="text-xs font-semibold text-slate-700 mt-0.5">정보 없음</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="p-4 bg-slate-50 rounded-b-2xl border-t border-slate-100 grid grid-cols-2 gap-2">
                    <button id="naverSearchBtn" class="flex items-center justify-center gap-1.5 bg-green-500 hover:bg-green-600 text-white text-xs font-bold py-2 px-3 rounded-xl transition shadow" target="_blank">
                        <span>네이버 검색</span>
                        <i data-lucide="external-link" class="w-3 h-3"></i>
                    </button>
                    <button id="kakaoSearchBtn" class="flex items-center justify-center gap-1.5 bg-yellow-400 hover:bg-yellow-500 text-slate-950 text-xs font-bold py-2 px-3 rounded-xl transition shadow" target="_blank">
                        <span>카카오 검색</span>
                        <i data-lucide="external-link" class="w-3 h-3"></i>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Custom elegant toast alert instead of standard alert() -->
    <div id="toast" class="fixed bottom-6 right-6 z-[600] transform translate-y-16 opacity-0 bg-slate-900 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center space-x-3 transition-all duration-300 pointer-events-none">
        <div class="p-1 bg-white/20 rounded-lg">
            <i data-lucide="check-circle" class="w-5 h-5 text-emerald-300" id="toastIcon"></i>
        </div>
        <div>
            <p id="toastMessage" class="text-xs font-medium">데이터 로드 완료!</p>
        </div>
    </div>

                "소재지주소": "경기도 안산시 단원구 광덕서로 78 (고잔동)",
                "좌석수": "140석",
                "주차": "건물 전용 무료 주차 3시간 제공",
                "휴무": "설, 추석 연휴 당일",
                "분류": "한식"
            }
        ];

        // Mapping Ansan neighborhoods (dong names) to precise geographic points
        const ansanDongCoordinates = {
            '고잔': [37.3162, 126.8251],
            '이동': [37.3111, 126.8521],
            '일동': [37.3151, 126.8651],
            '사동': [37.2951, 126.8451],
            '본오': [37.2985, 126.8721],
            '초지': [37.3021, 126.8121],
            '선부': [37.3351, 126.8081],
            '원곡': [37.3271, 126.7951],
            '월피': [37.3312, 126.8481],
            '성포': [37.3275, 126.8421],
            '신길': [37.3281, 126.7721],
            '와동': [37.3381, 126.8231],
            '건건': [37.3015, 126.9151],
            '대부': [37.2625, 126.5951],
            '성곡': [37.3125, 126.7851],
            '목내': [37.3110, 126.7651],
            '원시': [37.3021, 126.7751],
            '부곡': [37.3361, 126.8611],
            '수암': [37.3551, 126.8921],
            '팔곡': [37.2985, 126.9011],
            '화정': [37.3451, 126.8021]
        };

        // Categorization color pallet for visually outstanding marker pin icons
        const categoryThemes = {
            '한식': { bg: '#e11d48', text: 'white', label: '한식', icon: 'utensils' },
            '중식': { bg: '#f59e0b', text: 'black', label: '중식', icon: 'soup' },
            '일식': { bg: '#10b981', text: 'white', label: '일식', icon: 'shrub' },
            '양식': { bg: '#3b82f6', text: 'white', label: '양식', icon: 'beef' },
            '카페': { bg: '#ec4899', text: 'white', label: '카페/디저트', icon: 'coffee' },
            '기타': { bg: '#64748b', text: 'white', label: '기타/복합', icon: 'pizza' }
        };

        // State Variables
        let map;
        let activeMarkers = [];
        let loadedRestaurants = [];
        let currentFiltered = [];

        // Intelligent function to map arbitrary CSV column names to system object model
        function normalizeRow(row) {
            const findValue = (keys) => {
                for (let key of keys) {
                    const matchedKey = Object.keys(row).find(k => k.trim().replace(/_/g, '') === key.replace(/_/g, ''));
                    if (matchedKey) return row[matchedKey].trim();
                }
                return '';
            };

            const rawName = findValue(['식당이름', '업소명', '상호명', '제목', '가게명', '식당명']);
            const rawAddress = findValue(['소재지주소', '소재지', '주소', '소재지 도로명주소', '소재지도로명주소', '위치']);
            const rawDesc = findValue(['식당설명', '설명', '내용', '소개', '음식설명', '게시글내용', '상세설명', '요약소개문구', '식당설명요약']);
            const rawPhone = findValue(['전화번호', '연락처', '전화', '연락처전화번호']);
            const rawSeats = findValue(['좌석', '좌석수', '크기', '면적', '좌석규모']);
            const rawParking = findValue(['주차', '주차장', '주차정보', '주차가능여부', '주차가능']);
            const rawHoliday = findValue(['휴무일', '휴무', '정기휴무일', '영업시간', '정기휴무']);
            const rawCategory = findValue(['분류', '식당분류', '음식종류', '업태', '업종', '음식분류명']);

            if (!rawName && !rawAddress) return null;

            // Guessing Region (상록구 / 단원구)
            let region = '기타';
            if (rawAddress.includes('단원구') || rawAddress.includes('단원')) {
                region = '단원구';
            } else if (rawAddress.includes('상록구') || rawAddress.includes('상록')) {
                region = '상록구';
            }

            // Normalizing restaurant food category
            let normCategory = '기타';
            const cat = rawCategory || '';
            if (cat.includes('한식') || cat.includes('갈비') || cat.includes('국밥') || cat.includes('찌개') || cat.includes('밥') || cat.includes('백반') || cat.includes('돌솥')) normCategory = '한식';
            else if (cat.includes('중식') || cat.includes('중국') || cat.includes('짬뽕') || cat.includes('탕수육')) normCategory = '중식';
            else if (cat.includes('일식') || cat.includes('회') || cat.includes('초밥') || cat.includes('참치') || cat.includes('스시') || cat.includes('횟집')) normCategory = '일식';
            else if (cat.includes('양식') || cat.includes('피자') || cat.includes('파스타') || cat.includes('스테이크') || cat.includes('이태리')) normCategory = '양식';
            else if (cat.includes('카페') || cat.includes('베이커리') || cat.includes('디저트') || cat.includes('차') || cat.includes('커피')) normCategory = '카페';

            return {
                식당이름: rawName || '이름 없음',
                설명: rawDesc || '안산시에서 직접 지정한 우수한 위생 관리 및 미학이 담긴 생생 맛집입니다.',
                전화번호: rawPhone || '정보 없음',
                소재지주소: rawAddress || '안산시 영토 주소지',
                좌석수: rawSeats || '정보 없음',
                주차: rawParking || '정보 없음',
                휴무: rawHoliday || '정보 없음',
                분류: normCategory,
                구: region
            };
        }

        // Calculate latitude and longitude based on Ansan neighborhoods
        function calculateCoordinates(address, name) {
            for (let dong in ansanDongCoordinates) {
                if (address.includes(dong)) {
                    const base = ansanDongCoordinates[dong];
                    // Apply deterministic jitter using name code to avoid perfect overlaps
                    let hash = 0;
                    for (let i = 0; i < name.length; i++) {
                        hash = name.charCodeAt(i) + ((hash << 5) - hash);
                    }
                    const latJitter = ((hash % 100) / 8000) - 0.005;
                    const lngJitter = (((hash >> 3) % 100) / 8000) - 0.005;
                    return [base[0] + latJitter, base[1] + lngJitter];
                }
            }
            // Standard central Ansan with general jitter as fallback
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const latJitter = ((hash % 150) / 5000) - 0.015;
            const lngJitter = (((hash >> 3) % 150) / 5000) - 0.015;
            return [37.321878 + latJitter, 126.830889 + lngJitter];
        }

        // Leaflet setup inside window.onload
        window.onload = function() {
            // Initiate Icons
            lucide.createIcons();

            // Setup map container centered on Ansan City Hall
            map = L.map('map', {
                center: [37.321878, 126.830889],
                zoom: 12,
                zoomControl: false
            });

            // Standard elegant Mapbox/OSM tile layer
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                maxZoom: 20
            }).addTo(map);

            // Re-align zoom controls to bottom-right out of details overlap
            L.control.zoom({
                position: 'bottomright'
            }).addTo(map);

            // Set default interactive database first (Preloaded with all user's uploaded csv rows)
            loadDataset(defaultGourmetData);

            // Event handler for custom file uploads (CSV)
            document.getElementById('csvFileInput').addEventListener('change', handleCsvUpload);
        };

        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');

            toastMsg.innerText = message;
            if (isSuccess) {
                toastIcon.className = "w-5 h-5 text-emerald-300";
                toastIcon.setAttribute('data-lucide', 'check-circle');
            } else {
                toastIcon.className = "w-5 h-5 text-red-400";
                toastIcon.setAttribute('data-lucide', 'alert-circle');
            }
            lucide.createIcons();

            toast.classList.remove('translate-y-16', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.add('translate-y-16', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        function handleCsvUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Display file name label in Header
            document.getElementById('fileNameLabel').innerText = file.name;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                encoding: "EUC-KR", // Handle typical Korean government portal encodings gracefully
                complete: function(results) {
                    let parsedList = [];
                    
                    // Double check if data was loaded correctly or Korean was corrupted
                    if (results.errors.length > 5 || results.data.length === 0 || !Object.keys(results.data[0])[0].includes('식당') && !Object.keys(results.data[0])[0].includes('이름') && !Object.keys(results.data[0])[0].includes('상호')) {
                        // Re-try parsing using UTF-8 encoding
                        Papa.parse(file, {
                            header: true,
                            skipEmptyLines: true,
                            encoding: "UTF-8",
                            complete: function(utf8Results) {
                                processParsedResults(utf8Results.data);
                            }
                        });
                    } else {
                        processParsedResults(results.data);
                    }
                },
                error: function(err) {
                    showToast("CSV 파일을 읽는 중 에러가 발생했습니다.", false);
                    console.error(err);
                }
            });
        }

        function processParsedResults(rawData) {
            let parsedList = [];
            rawData.forEach(row => {
                const norm = normalizeRow(row);
                if (norm) parsedList.push(norm);
            });

            if (parsedList.length > 0) {
                // Update active dataset
                loadDataset(parsedList);
                // Update system alert
                const alertBox = document.getElementById('uploadAlert');
                alertBox.className = "bg-blue-50 border border-blue-200 text-blue-800 p-3 rounded-xl flex items-start space-x-2.5 text-xs";
                alertBox.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4 text-blue-600 mt-0.5 flex-shrink-0"></i><div><span class="font-bold">신규 파일 데이터 수입 완료!</span><br>업로드하신 CSV 파일에서 총 <span class="font-semibold text-blue-700">${parsedList.length}건</span>의 데이터를 읽어 즉시 매핑했습니다.</div>`;
                lucide.createIcons();
                showToast(`성공적으로 ${parsedList.length}개의 식당 정보를 가공/불러왔습니다!`);
            } else {
                showToast("식당 정보 컬럼 매핑에 실패했습니다.", false);
            }
        }

        function loadDataset(data) {
            loadedRestaurants = data;
            
            // Build live stats
            const total = loadedRestaurants.length;
            const danwon = loadedRestaurants.filter(r => r.구 === '단원구').length;
            const sangrok = loadedRestaurants.filter(r => r.구 === '상록구').length;

            document.getElementById('totalStat').innerText = total;
            document.getElementById('danwonStat').innerText = danwon;
            document.getElementById('sangrokStat').innerText = sangrok;

            // Trigger Map filtering & layout build
            applyFilters();
        }

        // Attach event listeners for dropdowns and search inputs
        document.getElementById('regionFilter').addEventListener('change', applyFilters);
        document.getElementById('categoryFilter').addEventListener('change', applyFilters);
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        function applyFilters() {
            const regionVal = document.getElementById('regionFilter').value;
            const categoryVal = document.getElementById('categoryFilter').value;
            const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();

            // Clear old map markers safely
            activeMarkers.forEach(m => map.removeLayer(m));
            activeMarkers = [];

            // Execute filters
            currentFiltered = loadedRestaurants.filter(rest => {
                // 1. Region Filter
                if (regionVal !== 'ALL') {
                    if (rest.구 !== regionVal) return false;
                }
                // 2. Category Filter
                if (categoryVal !== 'ALL') {
                    if (rest.분류 !== categoryVal) return false;
                }
                // 3. Search text
                if (searchVal) {
                    const matchName = rest.식당이름.toLowerCase().includes(searchVal);
                    const matchDesc = rest.설명.toLowerCase().includes(searchVal);
                    const matchAddr = rest.소재지주소.toLowerCase().includes(searchVal);
                    if (!matchName && !matchDesc && !matchAddr) return false;
                }
                return true;
            });

            // Update Statistics details
            document.getElementById('countSpan').innerText = currentFiltered.length;
            const activeRegionTxt = regionVal === 'ALL' ? '안산시 전역' : regionVal;
            const activeCategoryTxt = categoryVal === 'ALL' ? '모든 메뉴' : categoryVal;
            document.getElementById('activeFiltersLabel').innerText = `${activeRegionTxt} > ${activeCategoryTxt}`;

            // Build Leaflet markers & populate side list
            const listContainer = document.getElementById('restaurantList');
            listContainer.innerHTML = '';

            if (currentFiltered.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-8 text-slate-400">
                        <i data-lucide="compass" class="w-8 h-8 mx-auto stroke-1 mb-2"></i>
                        <p class="text-xs">조건에 맞는 맛집이 없습니다.</p>
                        <p class="text-[10px] text-slate-300 mt-1">상단의 필터를 재설정해 주세요.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            // Create markers & card lists
            currentFiltered.forEach((rest, idx) => {
                const coords = calculateCoordinates(rest.소재지주소, rest.식당이름);
                const theme = categoryThemes[rest.분류] || categoryThemes['기타'];

                // 1. Leaflet Marker Styling
                const customMarkerHtml = `
                    <div class="relative flex items-center justify-center rounded-full shadow-lg border-2 border-white transition-all duration-200 transform hover:scale-125 hover:z-[1000]" style="background-color: ${theme.bg}; width: 34px; height: 34px;">
                        <i data-lucide="${theme.icon}" style="width: 16px; height: 16px; color: ${theme.text};"></i>
                        <span class="absolute -bottom-1 -right-1 bg-slate-900 text-white rounded-full text-[7px] w-4 h-4 flex items-center justify-center font-bold border border-white">
                            ${idx + 1}
                        </span>
                    </div>
                `;

                const markerIcon = L.divIcon({
                    html: customMarkerHtml,
                    className: 'custom-leaflet-marker',
                    iconSize: [34, 34],
                    iconAnchor: [17, 17],
                    popupAnchor: [0, -15]
                });

                const marker = L.marker(coords, { icon: markerIcon }).addTo(map);
                
                // Construct compact map popups
                const popupContent = `
                    <div class="p-2 min-w-[200px] text-xs">
                        <span class="px-1.5 py-0.5 rounded text-[8px] font-bold text-white uppercase" style="background-color: ${theme.bg};">${theme.label}</span>
                        <h4 class="font-extrabold text-sm text-slate-900 mt-1">${rest.식당이름}</h4>
                        <p class="text-[10px] text-slate-500 mt-0.5 line-clamp-1">${rest.소재지주소}</p>
                        <p class="text-[10px] text-emerald-600 font-semibold mt-1 flex items-center gap-0.5">
                            <i data-lucide="phone" class="w-3 h-3"></i> ${rest.전화번호}
                        </p>
                    </div>
                `;
                
                marker.bindPopup(popupContent, { closeButton: false });
                
                // Marker Interactions
                marker.on('click', () => {
                    openDetailPanel(rest);
                    map.setView(coords, 15);
                });

                activeMarkers.push(marker);

                // 2. Generate list card item
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-100 hover:border-emerald-500 rounded-xl p-3.5 shadow-sm hover:shadow-md transition duration-200 cursor-pointer relative group flex flex-col justify-between";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start gap-1.5">
                            <div class="flex items-center gap-1.5 flex-wrap">
                                <span class="px-1.5 py-0.5 rounded text-[9px] font-bold text-white" style="background-color: ${theme.bg};">${theme.label}</span>
                                <span class="px-1.5 py-0.5 rounded text-[9px] font-medium text-slate-500 bg-slate-100">${rest.구}</span>
                            </div>
                            <span class="text-slate-300 text-xs font-mono group-hover:text-emerald-500 font-bold">#${idx + 1}</span>
                        </div>
                        <h4 class="text-sm font-bold text-slate-900 mt-2 group-hover:text-emerald-600 transition truncate">${rest.식당이름}</h4>
                        <p class="text-xs text-slate-500 mt-1 line-clamp-2 leading-relaxed">${rest.설명}</p>
                    </div>
                    <div class="mt-3 pt-2.5 border-t border-slate-50 flex items-center justify-between text-[11px] text-slate-400">
                        <span class="flex items-center gap-0.5 truncate"><i data-lucide="map-pin" class="w-3.5 h-3.5 text-slate-300"></i> ${rest.소재지주소}</span>
                    </div>
                `;

                // Card actions
                card.onclick = () => {
                    openDetailPanel(rest);
                    map.setView(coords, 16);
                    marker.openPopup();
                };

                listContainer.appendChild(card);
            });

            lucide.createIcons();

            // Fit map boundaries gracefully around markers
            if (activeMarkers.length > 0) {
                const group = new L.featureGroup(activeMarkers);
                map.fitBounds(group.getBounds().pad(0.15));
            }
        }

        function openDetailPanel(rest) {
            const panel = document.getElementById('detailPanel');
            const theme = categoryThemes[rest.분류] || categoryThemes['기타'];

            // Inject information
            document.getElementById('detailCategory').innerText = theme.label;
            document.getElementById('detailCategory').style.backgroundColor = theme.bg;
            document.getElementById('detailRegion').innerText = rest.구;
            document.getElementById('detailName').innerText = rest.식당이름;
            document.getElementById('detailDescription').innerText = rest.설명;
            document.getElementById('detailAddress').innerText = rest.소재지주소;
            document.getElementById('detailPhoneLink').innerText = rest.전화번호;
            document.getElementById('detailPhoneLink').href = `tel:${rest.전화번호}`;
            document.getElementById('detailSeats').innerText = rest.좌석수 || "정보 없음";
            document.getElementById('detailParking').innerText = rest.주차 || "정보 없음";
            document.getElementById('detailHoliday').innerText = rest.휴무 || "정보 없음";

            // Configure modern map navigation link searches
            document.getElementById('naverSearchBtn').onclick = () => {
                window.open(`https://search.naver.com/search.naver?query=안산+${encodeURIComponent(rest.식당이름)}`, '_blank');
            };
            document.getElementById('kakaoSearchBtn').onclick = () => {
                window.open(`https://map.kakao.com/?q=안산+${encodeURIComponent(rest.식당이름)}`, '_blank');
            };

            // Transition Animation
            panel.classList.remove('translate-y-full', 'opacity-0', 'pointer-events-none');
            panel.classList.add('translate-y-0', 'opacity-100', 'pointer-events-on');
            
            lucide.createIcons();
        }

        function closeDetailPanel() {
            const panel = document.getElementById('detailPanel');
            panel.classList.add('translate-y-full', 'opacity-0', 'pointer-events-none');
            panel.classList.remove('translate-y-0', 'opacity-100', 'pointer-events-on');
        }
    </script>
</body>
